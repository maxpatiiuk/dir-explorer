# eza --long --all --group-directories-first --time-style=long-iso --no-permissions --octal-permissions --no-user
# Eza impressions:
# fast
# has nice options
# not all options names match ls
# can't highlight just the file extensions
# very noisy by default (too many colors, icons), but can be streamlined

colourful: true

# Colors are in format of:
# color/paletteRef (Description) #color code

# Gold (Terminal Yellow) #f6c177
# Love (Terminal Red) #eb6f92
# Rose (Terminal Cyan) #ea9a97
# Base (Primary Background) #232136
# Iris (Terminal Magenta) #c4a7e7
# Foam (Terminal Blue) #9ccfd8
# Pine (Terminal Green)  #3e8fb0
# Muted (Low Contrast Foreground) #6e6a86
# Surface (Secondary Background Atop Base) #2a273f
# Overlay (Tertiary Background Atop Surface) #393552
# Subtle (Medium Contrast Foreground) #908caa
# Text (High Contrast Foreground) #e0def4
# Highlight Low (Low Contrast Highlight) #2a283e
# Highlight Med (Medium Contrast Highlight) #44415a
# Highlight High (High Contrast Highlight) #56526e

filekinds:
  normal: { foreground: '#030303' }
  directory: { foreground: 'blue' }
  symlink: { foreground: '#ff00ff' }
  pipe: { foreground: '#878700' }
  block_device: { foreground: '#870000' }
  char_device: { foreground: '#ffff00' }
  socket: { foreground: '#87ff5f' }
  special: { foreground: '#ff00ff' }
  executable: { foreground: '#00cd00' }
  mount_point: { foreground: '#000087' }

perms:
  user_read: { foreground: '#030303' }
  user_write: { foreground: '#030303' }
  user_execute_file: { foreground: '#030303' }
  user_execute_other: { foreground: '#030303' }
  group_read: { foreground: '#030303' }
  group_write: { foreground: '#030303' }
  group_execute: { foreground: '#030303' }
  other_read: { foreground: '#030303' }
  other_write: { foreground: '#030303' }
  other_execute: { foreground: '#030303' }
  special_user_file: { foreground: '#030303' }
  special_other: { foreground: '#030303' }
  attribute: { foreground: '#030303' }

size:
  major: { foreground: '#030303' }
  minor: { foreground: '#030303' }
  number_byte: { foreground: '#030303' }
  number_kilo: { foreground: '#030303' }
  number_mega: { foreground: '#030303' }
  number_giga: { foreground: '#030303' }
  number_huge: { foreground: '#030303' }
  unit_byte: { foreground: '#030303' }
  unit_kilo: { foreground: '#030303' }
  unit_mega: { foreground: '#030303' }
  unit_giga: { foreground: '#030303' }
  unit_huge: { foreground: '#030303' }

users:
  user_you: { foreground: '#030303' }
  user_root: { foreground: '#030303' }
  user_other: { foreground: '#030303' }
  group_yours: { foreground: '#030303' }
  group_other: { foreground: '#030303' }
  group_root: { foreground: '#030303' }

links:
  normal: { foreground: '#030303' }
  multi_link_file: { foreground: '#030303' }

git:
